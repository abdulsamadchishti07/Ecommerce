{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Out — EvoCart</title>
    <meta name="description" content="Sign out of your EvoCart account.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}?v=2">
</head>
<body class="flex items-center justify-center min-h-screen p-4 md:p-8 relative">
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <!-- Brand -->
        <div class="text-center mb-7 fade-up">
            <a href="/" class="inline-flex items-center text-white text-2xl font-bold">
                <span style="width:8px;height:8px;border-radius:50%;background:#FF6A3D;display:inline-block;margin-right:8px;"></span>
                EvoCart
            </a>
            <p class="text-white/35 text-sm mt-1">Leaving so soon?</p>
        </div>

        <div class="glass-card rounded-2xl p-8 fade-up-d text-center">
            <div class="flex justify-center mb-5">
                <div style="width:64px;height:64px;border-radius:50%;background:rgba(225,29,72,0.15);border:1.5px solid rgba(225,29,72,0.35);display:flex;align-items:center;justify-content:center;">
                    <img src="{% static 'icons/accounts/logout red.png' %}" width="28" height="28" alt="">
                </div>
            </div>
            
            <h1 class="text-white text-xl font-semibold mb-2">Sign Out</h1>
            <p class="text-white/50 text-sm mb-6">Are you sure you want to sign out of your account?</p>

            <form method="post" action="{% url 'account_logout' %}">
                {% csrf_token %}
                {% if redirect_field_value %}
                    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
                {% endif %}
                <div class="space-y-3">
                    <button type="submit" class="danger-btn">Sign Out</button>
                    <a href="javascript:history.back()" class="secondary-btn">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
