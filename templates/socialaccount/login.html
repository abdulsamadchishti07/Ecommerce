{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — EvoCart</title>
    <meta name="description" content="Sign in to your EvoCart account securely with Google.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body class="auth-bg flex items-center justify-center min-h-screen p-4 md:p-8 relative">
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <!-- Ambient orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="w-full max-w-md relative z-10">

        <!-- Logo / Brand -->
        <div class="text-center mb-8 fade-up">
            <a href="/" class="inline-flex items-center text-white text-2xl font-bold tracking-tight">
                <span class="brand-dot"></span>EvoCart
            </a>
            <p class="mt-2 text-sm text-white/40">Premium shopping experience</p>
        </div>

        <!-- Card -->
        <div class="glass-card rounded-2xl p-8 fade-up-delay">

            <div class="mb-6">
                <h1 class="text-white text-2xl font-semibold">Welcome back</h1>
                <p class="text-white/50 text-sm mt-1">Sign in to continue to your account</p>
            </div>

            <!-- Google Sign-In -->
            <form method="post" action="{% url 'google_login' %}">
                {% csrf_token %}
                <input type="hidden" name="process" value="login">
                <button type="submit" id="google-signin-btn" class="google-btn w-full flex items-center justify-center gap-3 py-3 px-4 rounded-xl font-medium text-sm">
                    <img src="{% static 'icons/accounts/google.png' %}" width="20" height="20" alt="Google">
                    Continue with Google
                </button>i
            </form>

            <div class="divider my-6">
                <span class="text-white/30 text-xs">Secured by Google OAuth 2.0</span>
            </div>

            <!-- Trust signals -->
            <div class="flex items-center justify-center gap-4 text-white/30 text-xs">
                <span class="flex items-center gap-1">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
                    Encrypted
                </span>
                <span>·</span>
                <span class="flex items-center gap-1">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                    No password stored
                </span>
                <span>·</span>
                <span>Private</span>
            </div>
        </div>

        <!-- Footer links -->
        <p class="text-center text-white/30 text-xs mt-6 fade-up">
            By continuing, you agree to our
            <a href="#" class="text-white/50 hover:text-white underline underline-offset-2 transition-colors">Terms</a>
            and
            <a href="#" class="text-white/50 hover:text-white underline underline-offset-2 transition-colors">Privacy Policy</a>
        </p>

    </div>
</body>
</html>
